<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 - 頁面不存在 | Dungi Sebulur Team</title>
    <meta name="description" content="找不到您要的頁面。返回 Dungi Sebulur Team 首頁。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Poppins', 'Noto Sans TC', sans-serif;
            color: #e8e8ea;
            background: #0a0a0d;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        
        :root {
            --accent: #ff2b4d;
            --accent-hover: #ff5580;
            --display-font: 'Oswald', 'Noto Sans TC', sans-serif;
        }
        
        /* Background Animation */
        .bg-gradient {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 43, 77, 0.15), transparent 70%);
            animation: float 20s ease-in-out infinite;
        }
        
        .bg-gradient-1 {
            top: -200px;
            left: -200px;
        }
        
        .bg-gradient-2 {
            bottom: -200px;
            right: -200px;
            animation-delay: -10s;
            background: radial-gradient(circle, rgba(80, 60, 255, 0.1), transparent 70%);
        }
        
        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            25% {
                transform: translate(30px, -30px) scale(1.05);
            }
            50% {
                transform: translate(-20px, 20px) scale(0.95);
            }
            75% {
                transform: translate(-30px, -10px) scale(1.02);
            }
        }
        
        /* Content */
        .error-container {
            text-align: center;
            z-index: 1;
            position: relative;
            padding: 40px;
            max-width: 600px;
        }
        
        .error-code {
            font-family: var(--display-font);
            font-size: clamp(120px, 20vw, 200px);
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, var(--accent), #ff80a0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.8;
                transform: scale(0.98);
            }
        }
        
        .error-title {
            font-family: var(--display-font);
            font-size: clamp(28px, 5vw, 42px);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 16px;
        }
        
        .error-message {
            font-size: 18px;
            color: #b3b3ba;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        
        .error-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            border-radius: 4px;
            font-family: var(--display-font);
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: var(--accent);
            color: #fff;
        }
        
        .btn-primary:hover {
            background: var(--accent-hover);
            box-shadow: 0 10px 30px rgba(255, 43, 77, 0.4);
            transform: translateY(-2px);
        }
        
        .btn-outline {
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #e8e8ea;
            background: transparent;
        }
        
        .btn-outline:hover {
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
        }
        
        /* DJ Animation */
        .dj-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 60px;
            opacity: 0.3;
        }
        
        .dj-icon {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            background: linear-gradient(135deg, #1a1a20, #2a2a30);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--display-font);
            font-weight: 700;
            font-size: 20px;
            color: var(--accent);
            animation: bounce 2s ease-in-out infinite;
        }
        
        .dj-icon:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .dj-icon:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        .dj-icon:nth-child(4) {
            animation-delay: 0.6s;
        }
        
        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            .error-container {
                padding: 20px;
            }
            
            .error-code {
                font-size: 100px;
            }
            
            .error-title {
                font-size: 24px;
            }
            
            .error-message {
                font-size: 16px;
            }
            
            .error-buttons {
                flex-direction: column;
                align-items: stretch;
            }
            
            .btn {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="bg-gradient bg-gradient-1"></div>
    <div class="bg-gradient bg-gradient-2"></div>
    
    <div class="error-container">
        <div class="error-code">404</div>
        <h1 class="error-title">頁面不存在</h1>
        <p class="error-message">
            抱歉！您要找的頁面似乎已經移動或不存在。<br>
            讓我們帶您回到正確的地方。
        </p>
        
        <div class="error-buttons">
            <a href="/" class="btn btn-primary">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                返回首頁
            </a>
            <a href="javascript:history.back()" class="btn btn-outline">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
                上一頁
            </a>
        </div>
        
        <div class="dj-icons">
            <div class="dj-icon">R</div>
            <div class="dj-icon">V</div>
            <div class="dj-icon">D</div>
            <div class="dj-icon">L</div>
        </div>
    </div>
    
    <script>
        // Automatic redirect after 10 seconds
        setTimeout(function() {
            window.location.href = '/';
        }, 10000);
        
        // Add particle effect on mouse move (optional)
        document.addEventListener('mousemove', function(e) {
            const gradients = document.querySelectorAll('.bg-gradient');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            gradients[0].style.transform = `translate(${x * 20}px, ${y * 20}px)`;
            gradients[1].style.transform = `translate(${-x * 20}px, ${-y * 20}px)`;
        });
    </script>
</body>
</html>
